<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF4B7D"/>
      <stop offset="100%" stop-color="#C9177E"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#C9177E" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Фон с градиентом -->
  <rect width="512" height="512" rx="128" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Блик сверху -->
  <rect width="512" height="512" rx="128" fill="url(#shine)"/>

  <!-- Буква «И» — три жирные линии -->
  <!-- Левая вертикаль -->
  <line x1="138" y1="148" x2="138" y2="364"
        stroke="white" stroke-width="68" stroke-linecap="round"/>
  <!-- Правая вертикаль -->
  <line x1="374" y1="148" x2="374" y2="364"
        stroke="white" stroke-width="68" stroke-linecap="round"/>
  <!-- Диагональ (И — это не N, диагональ идёт сверху-справа вниз-влево) -->
  <line x1="374" y1="154" x2="138" y2="358"
        stroke="white" stroke-width="52" stroke-linecap="round"/>

  <!-- Маленькая искра в углу -->
  <circle cx="392" cy="108" r="22" fill="white" opacity="0.9"/>
  <circle cx="392" cy="108" r="11" fill="#FF4B7D"/>
</svg>
